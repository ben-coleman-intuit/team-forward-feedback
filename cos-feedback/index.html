<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peer feedback — COS</title>
    <link rel="stylesheet" href="styles.css" />
    <!--
      Supabase: the anon key is designed to be public in the browser.
      Security comes from Row Level Security (RLS) on the `responses` table — keep RLS
      ENABLED in the Supabase dashboard and review policies in supabase/schema.sql.

      Local dev: copy .env.example to .env, fill values, mirror them into the script below.
      GitHub Pages cannot read .env; deploy with real values in the placeholders (or use a CI inject step).
    -->
    <script>
      window.COS_SUPABASE_URL = "REPLACE_WITH_SUPABASE_URL";
      window.COS_SUPABASE_ANON_KEY = "REPLACE_WITH_SUPABASE_ANON_KEY";
    </script>
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main>
      <p class="eyebrow">Peer feedback</p>
      <h1>Survey</h1>
      <p class="intro">
        Submit structured feedback once per teammate. Responses sync to a shared dashboard (Supabase).
      </p>

      <p id="config-warning" class="msg error hidden"></p>

      <form id="survey-form" class="stack">
        <div>
          <label for="name">Teammate you are reviewing (full name)</label>
          <input id="name" name="name" type="text" required maxlength="200" autocomplete="name" />
        </div>
        <div>
          <label for="submittedBy">Your name</label>
          <input
            id="submittedBy"
            name="submittedBy"
            type="text"
            required
            maxlength="200"
            autocomplete="name"
          />
        </div>
        <div>
          <label>Ratings (1 = low, 5 = high)</label>
          <div class="rating-row">
            <span>Collaboration</span>
            <input type="number" id="r_collab" min="1" max="5" value="3" required />
          </div>
          <div class="rating-row">
            <span>Communication</span>
            <input type="number" id="r_comm" min="1" max="5" value="3" required />
          </div>
          <div class="rating-row">
            <span>Reliability / delivery</span>
            <input type="number" id="r_rel" min="1" max="5" value="3" required />
          </div>
        </div>
        <div>
          <label for="comments">Comments</label>
          <textarea id="comments" name="comments" maxlength="8000" placeholder="Strengths, growth areas, examples…"></textarea>
        </div>
        <button type="submit" id="submit-btn">Submit feedback</button>
        <p id="form-msg" class="msg" aria-live="polite"></p>
      </form>

      <h2>Dashboard</h2>
      <p id="dashboard-status">Loading responses…</p>
      <div id="dashboard-list"></div>
    </main>
  </body>
</html>
