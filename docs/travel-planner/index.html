<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team travel scenario planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">Scenario planner</p>
      <h1>Team travel cost calculator</h1>
      <p class="intro">Enter headcount and per-person travel cost for each geo, then pick a scenario to see the total.</p>

      <div class="top-row">
        <div class="top-left">
          <h2>Scenario</h2>
          <div id="scenario-picker"></div>
        </div>
        <div class="top-right">
          <div id="result" class="result-card hidden">
            <div class="result-total" id="result-total"></div>
            <div class="result-label">Estimated total cost</div>
            <div id="result-breakdown"></div>
          </div>
          <div id="result-placeholder" class="result-placeholder">Select a scenario to see cost</div>
        </div>
      </div>

      <h2>Inputs</h2>
      <div id="geo-grid"></div>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
