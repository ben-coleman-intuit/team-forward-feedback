<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Org chart</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #fff;
        margin: 0;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      @media print { body { padding: 0.5in; } }
      svg { max-width: 100%; height: auto; }
    </style>
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
      <defs>
        <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
          <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
        </filter>
      </defs>

      <!-- SOLID LINES (reporting) -->
      <g stroke="#94a3b8" stroke-width="2" fill="none">
        <!-- Board → CEO -->
        <path d="M480,42 L480,70"/>
        <!-- CEO → CTO -->
        <path d="M480,112 L480,130 L170,130 L170,160"/>
        <!-- CEO → Consumer Products -->
        <path d="M480,112 L480,130 L370,130 L370,160"/>
        <!-- CEO → Business Products -->
        <path d="M480,112 L480,130 L590,130 L590,160"/>
        <!-- CEO → Legal -->
        <path d="M480,112 L480,130 L790,130 L790,160"/>
        <!-- CTO → Fintech GM -->
        <path d="M170,202 L170,230 L120,230 L120,260"/>
        <!-- CTO → Trust & Safety -->
        <path d="M170,202 L170,230 L270,230 L270,260"/>
        <!-- Legal → Compliance -->
        <path d="M790,202 L790,260"/>
        <!-- Fintech GM → CRO -->
        <path d="M120,302 L120,360"/>
      </g>

      <!-- DOTTED LINES (CRO relationships) -->
      <g stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6,4" fill="none">
        <!-- CRO → Trust & Safety -->
        <path d="M170,380 C300,380 270,302 270,302"/>
        <!-- CRO → Compliance -->
        <path d="M170,380 C480,430 790,340 790,302"/>
      </g>

      <!-- QUARTERLY LINE (CRO → Board) -->
      <path d="M60,380 C-10,380 -10,22 430,22"
            stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" fill="none"/>
      <text x="8" y="210" fill="#f59e0b" font-size="11" font-family="system-ui, sans-serif"
            transform="rotate(-90,8,210)" text-anchor="middle">Quarterly report</text>

      <!-- BOXES -->
      <!-- Board -->
      <rect x="430" y="2" width="100" height="40" rx="6" fill="#1e293b" filter="url(#shadow)"/>
      <text x="480" y="27" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="system-ui, sans-serif">Board</text>

      <!-- CEO -->
      <rect x="430" y="72" width="100" height="40" rx="6" fill="#1e293b" filter="url(#shadow)"/>
      <text x="480" y="97" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="system-ui, sans-serif">CEO</text>

      <!-- CTO -->
      <rect x="110" y="162" width="120" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="170" y="187" text-anchor="middle" fill="#334155" font-size="13" font-weight="600" font-family="system-ui, sans-serif">CTO</text>

      <!-- Consumer Products -->
      <rect x="300" y="162" width="140" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="370" y="180" text-anchor="middle" fill="#334155" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Consumer</text>
      <text x="370" y="195" text-anchor="middle" fill="#334155" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Products</text>

      <!-- Business Products -->
      <rect x="520" y="162" width="140" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="590" y="180" text-anchor="middle" fill="#334155" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Business</text>
      <text x="590" y="195" text-anchor="middle" fill="#334155" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Products</text>

      <!-- Legal -->
      <rect x="730" y="162" width="120" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="790" y="187" text-anchor="middle" fill="#334155" font-size="13" font-weight="600" font-family="system-ui, sans-serif">Legal</text>

      <!-- Fintech GM -->
      <rect x="55" y="262" width="130" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="120" y="287" text-anchor="middle" fill="#334155" font-size="13" font-weight="600" font-family="system-ui, sans-serif">Fintech GM</text>

      <!-- Trust & Safety -->
      <rect x="205" y="262" width="130" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="270" y="280" text-anchor="middle" fill="#334155" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Trust &amp;</text>
      <text x="270" y="295" text-anchor="middle" fill="#334155" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Safety</text>

      <!-- Compliance -->
      <rect x="730" y="262" width="120" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
      <text x="790" y="287" text-anchor="middle" fill="#334155" font-size="13" font-weight="600" font-family="system-ui, sans-serif">Compliance</text>

      <!-- CRO -->
      <rect x="60" y="362" width="120" height="40" rx="6" fill="#0c4a6e" filter="url(#shadow)"/>
      <text x="120" y="387" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="system-ui, sans-serif">CRO</text>

      <!-- LEGEND -->
      <g transform="translate(250,520)">
        <line x1="0" y1="0" x2="30" y2="0" stroke="#94a3b8" stroke-width="2"/>
        <text x="36" y="4" fill="#64748b" font-size="11" font-family="system-ui, sans-serif">Direct report</text>

        <line x1="160" y1="0" x2="190" y2="0" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6,4"/>
        <text x="196" y="4" fill="#64748b" font-size="11" font-family="system-ui, sans-serif">Dotted-line relationship</text>

        <line x1="380" y1="0" x2="410" y2="0" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4"/>
        <text x="416" y="4" fill="#64748b" font-size="11" font-family="system-ui, sans-serif">Quarterly board report</text>
      </g>
    </svg>
  </body>
</html>
