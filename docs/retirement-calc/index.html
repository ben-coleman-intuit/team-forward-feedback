<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retirement drawdown calculator</title>
    <style>
      :root {
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --border: #3f3f46;
        --accent: #0ea5e9;
        --card: #18181b;
        --ok: #4ade80;
        --danger: #f87171;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }

      main {
        max-width: 32rem;
        margin: 0 auto;
        padding: 2.5rem 1rem 4rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
      }

      .intro {
        color: var(--muted);
        font-size: 0.9rem;
        margin: 0 0 1.5rem;
      }

      .fields {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .section-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        font-weight: 600;
        margin-top: 0.75rem;
      }

      label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.2rem;
      }

      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .prefix {
        position: absolute;
        left: 0.6rem;
        font-size: 0.9rem;
        color: var(--muted);
        pointer-events: none;
      }

      .suffix {
        position: absolute;
        right: 0.6rem;
        font-size: 0.9rem;
        color: var(--muted);
        pointer-events: none;
      }

      input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        font-size: 1rem;
        text-align: right;
      }

      input.has-prefix { padding-left: 1.5rem; }
      input.has-suffix { padding-right: 2rem; }

      input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 0;
      }

      .result-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 1.5rem;
        text-align: center;
        margin-top: 1.5rem;
      }

      .result-value {
        font-size: 3rem;
        font-weight: 800;
        line-height: 1.1;
      }

      .result-label {
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 0.25rem;
      }

      .result-detail {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 0.75rem;
        text-align: left;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Drawdown calculator</h1>
      <p class="intro">When does the money run out?</p>

      <div class="fields">
        <div class="section-label">Today</div>
        <div>
          <label for="currentAge">Current age</label>
          <input type="number" id="currentAge" value="40" min="1" max="120" />
        </div>
        <div>
          <label for="principal">Current principal</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="principal" class="has-prefix" value="500000" min="0" step="10000" />
          </div>
        </div>
        <div>
          <label for="savingsPerYear">Annual savings (until retirement)</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="savingsPerYear" class="has-prefix" value="30000" min="0" step="1000" />
          </div>
        </div>

        <div class="section-label">Retirement</div>
        <div>
          <label for="retireAge">Retirement age</label>
          <input type="number" id="retireAge" value="65" min="1" max="120" />
        </div>
        <div>
          <label for="withdrawal">Annual withdrawal (today's dollars)</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="withdrawal" class="has-prefix" value="80000" min="0" step="1000" />
          </div>
        </div>

        <div class="section-label">Assumptions</div>
        <div>
          <label for="returnRate">Annual return</label>
          <div class="input-wrap">
            <input type="number" id="returnRate" class="has-suffix" value="7" step="0.1" />
            <span class="suffix">%</span>
          </div>
        </div>
        <div>
          <label for="inflation">Annual inflation</label>
          <div class="input-wrap">
            <input type="number" id="inflation" class="has-suffix" value="3" step="0.1" />
            <span class="suffix">%</span>
          </div>
        </div>
      </div>

      <div class="result-card">
        <div class="result-value" id="result-value">—</div>
        <div class="result-label">Ending age (principal hits $0)</div>
        <div class="result-detail" id="result-detail"></div>
      </div>
    </main>

    <script>
      function fmt(n) {
        return "$" + Math.round(n).toLocaleString("en-US");
      }

      function calculate() {
        const currentAge = Number(document.getElementById("currentAge").value) || 40;
        const principal = Number(document.getElementById("principal").value) || 0;
        const savingsPerYear = Number(document.getElementById("savingsPerYear").value) || 0;
        const retireAge = Number(document.getElementById("retireAge").value) || 65;
        const withdrawalToday = Number(document.getElementById("withdrawal").value) || 0;
        const annualReturn = (Number(document.getElementById("returnRate").value) || 0) / 100;
        const inflation = (Number(document.getElementById("inflation").value) || 0) / 100;

        const resultEl = document.getElementById("result-value");
        const detailEl = document.getElementById("result-detail");

        if (principal <= 0 || withdrawalToday <= 0 || retireAge <= currentAge) {
          resultEl.textContent = "—";
          resultEl.style.color = "";
          detailEl.textContent = "";
          return;
        }

        // Phase 1: accumulation (current age → retirement age)
        const accumYears = retireAge - currentAge;
        let balance = principal;
        for (let i = 0; i < accumYears; i++) {
          balance = balance * (1 + annualReturn) + savingsPerYear;
        }

        // Adjust withdrawal for inflation from now to retirement
        let yearlyWithdrawal = withdrawalToday * Math.pow(1 + inflation, accumYears);

        const balanceAtRetirement = balance;

        // Phase 2: drawdown (retirement → $0)
        const maxYears = 200;
        let age = retireAge;
        let drawdownYears = 0;

        while (balance > 0 && drawdownYears < maxYears) {
          balance = balance * (1 + annualReturn);
          balance -= yearlyWithdrawal;
          yearlyWithdrawal *= (1 + inflation);
          drawdownYears++;
          age++;
        }

        const details =
          "Principal at retirement: " + fmt(balanceAtRetirement) + "\n" +
          "First year withdrawal: " + fmt(withdrawalToday * Math.pow(1 + inflation, accumYears)) + "\n" +
          "Years saving: " + accumYears + " · Years withdrawing: " + drawdownYears;

        if (drawdownYears >= maxYears) {
          resultEl.textContent = "Never";
          resultEl.style.color = "#4ade80";
          detailEl.textContent = details + "\nMoney outlasts 200+ years at these rates.";
        } else {
          resultEl.textContent = age;
          resultEl.style.color = age >= 95 ? "#4ade80" : age >= 80 ? "#f59e0b" : "#f87171";
          detailEl.textContent = details;
        }
      }

      document.querySelectorAll("input").forEach(function (el) {
        el.addEventListener("input", calculate);
      });

      calculate();
    </script>
  </body>
</html>
