<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leadership dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">Private</p>
      <h1>Leadership feedback — Dashboard</h1>
      <p class="intro">
        Aggregated anonymous results. Only accessible with the dashboard passphrase.
      </p>

      <div id="gate">
        <input type="password" id="passphrase" placeholder="Enter passphrase" autocomplete="off" />
        <button id="gate-btn">Unlock</button>
        <p id="gate-msg" class="msg"></p>
      </div>

      <div id="dashboard" class="hidden">
        <div id="overall"></div>
        <h2>Category breakdown</h2>
        <div id="categories"></div>
        <h2>Free-text responses</h2>
        <div id="freetext"></div>
      </div>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
