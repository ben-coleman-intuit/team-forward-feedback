<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team FORWARD — Year End Feedback</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="main">
      <p class="eyebrow">Team FORWARD</p>
      <h1>Year End Feedback Form</h1>
      <p class="intro">
        Share structured feedback for your teammates. Submissions are saved to a Google Sheet only
        accessible by Ben Coleman.
      </p>
      <div id="loading">Loading…</div>
      <div id="form-root" class="hidden"></div>
      <div id="done" class="success hidden">
        <h2>Thank you</h2>
        <p>Your feedback was submitted and recorded in the team Sheet.</p>
      </div>
    </main>
    <iframe name="sheet-iframe" id="sheet-iframe" title="Submission" style="display: none"></iframe>
    <script src="app.js" defer></script>
  </body>
</html>
