<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team FORWARD — Year End Feedback</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="main">
      <p class="eyebrow">Team FORWARD</p>
      <h1>Year End Feedback Form</h1>
      <p class="intro">
        Share structured feedback for your teammates. Submissions are sent securely via Formspree
        (no server or database run by this site).
      </p>
      <div id="loading">Loading…</div>
      <div id="form-root" class="hidden"></div>
      <div id="done" class="success hidden">
        <h2>Thank you</h2>
        <p>Your feedback was submitted. You should receive a confirmation from Formspree if enabled.</p>
      </div>
    </main>
    <script src="app.js" type="module"></script>
  </body>
</html>
