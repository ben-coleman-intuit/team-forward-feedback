<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ben's Leadership Feedback Survey — FY26</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">Anonymous</p>
      <h1>Ben's Leadership Feedback Survey — FY26</h1>
      <p class="intro">
        I would love to hear how I'm doing on any or all of the dimensions below
        (1 = strongly disagree, 10 = strongly agree).
        This survey is <strong>completely anonymous</strong> — no names or emails are collected.
      </p>

      <div id="form-root"></div>

      <div id="done" class="success hidden">
        <h2>Thank you</h2>
        <p>Your anonymous feedback has been recorded.</p>
      </div>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
